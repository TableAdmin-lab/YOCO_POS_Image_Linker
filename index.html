<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoco Image Linker</title>
    <!-- Core Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyan: '#00B8E6',
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        .glass-card { backdrop-filter: blur(12px); }
        .mode-badge {
            background: linear-gradient(135deg, #00B8E6 0%, #0099CC 100%);
            color: black; padding: 6px 14px; border-radius: 999px;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1em; box-shadow: 0 4px 12px rgba(0, 184, 230, 0.3);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-black text-slate-900 dark:text-white">

    <div class="max-w-[1400px] mx-auto px-6 py-12">
        <header class="mb-16 relative">
            <div class="absolute top-0 right-0 flex items-center gap-4">
                <div class="mode-badge">STANDALONE LINKER</div>
                <button id="clearAllBtn" class="px-6 py-3 rounded-xl bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition-all text-xs font-black uppercase tracking-widest hidden">Clear All</button>
                <button id="themeToggle" class="p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-500 dark:text-[#00B8E6] hover:scale-110 transition-all">
                    <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                    </svg>
                    <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                    </svg>
                </button>
            </div>
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tighter mb-4 leading-tight">
                Image <span class="text-cyan">Linker</span>
            </h1>
            <p class="text-slate-500 dark:text-slate-400 text-lg md:text-xl max-w-2xl">
                Upload a completed Yoco Export, link images from Google Drive, and export the updated file.
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4 space-y-6">
                <!-- Config Card -->
                <div class="bg-white dark:bg-[#0A0A0A] border border-slate-200 dark:border-slate-800 p-6 rounded-3xl shadow-sm">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center mb-2">
                        Google Drive Folder URL
                        <div class="group relative inline-block ml-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400 hover:text-cyan cursor-help transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block w-48 p-3 bg-slate-800 text-white text-[10px] rounded-xl shadow-xl z-10 text-center font-normal normal-case tracking-normal">
                                Paste the public share link to your images folder. Folder must be set to "Anyone with the link can view".
                                <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
                            </div>
                        </div>
                    </label>
                    <input type="text" id="driveFolderInput" placeholder="https://drive.google.com/drive/folders/..."
                        class="w-full bg-slate-50 dark:bg-black text-slate-900 dark:text-white px-4 py-3 text-sm border border-slate-200 dark:border-slate-800 rounded-xl focus:border-cyan outline-none font-semibold mb-4">
                    
                    <button id="fetchDriveImagesBtn" class="w-full py-4 bg-cyan text-black rounded-xl font-black text-xs uppercase shadow-lg hover:brightness-110 transition-all disabled:opacity-50">
                        Fetch Drive Images
                    </button>
                </div>

                <!-- Drop Zone Card -->
                <div id="dropZone" class="border border-slate-200 dark:border-slate-800 rounded-3xl p-10 flex flex-col items-center justify-center bg-white dark:bg-[#0A0A0A] cursor-pointer hover:border-cyan group transition-all shadow-sm">
                    <input type="file" id="fileInput" class="hidden" accept=".csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel">
                    <div class="w-16 h-16 bg-slate-100 dark:bg-slate-900 text-slate-400 dark:text-cyan rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                    </div>
                    <p class="font-bold text-center">Upload Yoco Export</p>
                    <p class="text-[10px] text-slate-400 mt-2 uppercase tracking-widest text-center">.XLSX or .CSV</p>
                </div>

                <div id="statusMessage" class="hidden p-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest border"></div>
            </div>

            <div class="lg:col-span-8 flex flex-col gap-6">
                <div id="controlsBar" class="hidden glass-card bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 p-6 rounded-3xl flex gap-6 shadow-sm">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase flex items-center mb-2">Search Items</label>
                        <input type="text" id="masterFilter" placeholder="Filter results..."
                            class="w-full bg-slate-50 dark:bg-black text-slate-900 dark:text-white px-4 py-2.5 text-sm border border-slate-200 dark:border-slate-800 rounded-xl focus:border-cyan outline-none">
                    </div>
                    <div class="flex items-end">
                        <button id="excelBtn" class="py-2.5 px-8 bg-cyan text-black text-xs font-black rounded-xl uppercase shadow-lg">Download Updated File</button>
                    </div>
                </div>

                <div class="glass-card bg-white dark:bg-white/5 border border-slate-200 dark:border-slate-800 rounded-3xl overflow-hidden flex-1 min-h-[500px] flex flex-col shadow-sm">
                    <div class="flex-1 overflow-x-auto">
                        <table id="resultsTable" class="w-full text-sm text-left hidden">
                            <thead id="tableHead" class="bg-slate-50 dark:bg-black/50 text-slate-400 uppercase text-[10px] font-bold">
                                <tr>
                                    <th class="px-8 py-5">Image</th>
                                    <th class="px-8 py-5">Product Name</th>
                                    <th class="px-8 py-5">Category</th>
                                    <th class="px-8 py-5">Price</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-100 dark:divide-slate-800/50"></tbody>
                        </table>
                        <div id="emptyState" class="flex flex-col items-center justify-center h-full py-40 text-slate-400 dark:text-slate-600">
                            <p class="text-xl font-bold">Awaiting Upload</p>
                            <p class="text-xs mt-2 uppercase tracking-widest opacity-50">Upload a Yoco export to start linking</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Picker Modal -->
    <div id="imagePickerModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/70 backdrop-blur-md p-4">
        <div class="bg-white dark:bg-[#0A0A0A] rounded-3xl max-w-4xl w-full flex flex-col h-[80vh] shadow-2xl border border-slate-100 dark:border-slate-800 overflow-hidden">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-white dark:bg-[#0A0A0A] z-10">
                <div>
                    <h3 class="text-xl font-black uppercase tracking-tighter">Select Image</h3>
                    <p class="text-slate-500 text-xs mt-1 font-medium">Linking image for: <span class="text-cyan font-bold" id="imagePickerProductName">Product Name</span></p>
                </div>
                <button id="closeImagePickerModal" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="p-4 border-b border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-black/20">
                <input type="text" id="imagePickerSearch" placeholder="Search images by filename..."
                    class="w-full bg-white dark:bg-black text-slate-900 dark:text-white px-4 py-2.5 text-sm border border-slate-200 dark:border-slate-800 rounded-xl focus:border-cyan outline-none">
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <div id="imagePickerGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, onAuthStateChanged, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvvPbA8b1HsUg_vjv26XtarPto2hpwy_Q",
            authDomain: "menutool-fbdba.firebaseapp.com",
            projectId: "menutool-fbdba",
            storageBucket: "menutool-fbdba.firebasestorage.app",
            messagingSenderId: "234158065758",
            appId: "1:234158065758:web:71572249708f057c670ccf",
            measurementId: "G-HDF1C7H18Y"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const init = () => {
            let masterData = []; // Full raw rows from excel
            let driveImages = [];
            let currentlyPickingImageForIndex = null;
            let fileHeaders = [];
            let googleAccessToken = localStorage.getItem('linkerGoogleToken') || null;

            const IMAGE_COL_INDEX = 21; // Standard Yoco export Image URL index
            const NAME_COL_INDEX = 1;
            const CAT_COL_INDEX = 5;
            const PRICE_COL_INDEX = 3;

            function showStatus(m, t) {
                const s = document.getElementById('statusMessage'); s.textContent = m; s.classList.remove('hidden');
                s.className = `p-4 rounded-2xl text-[10px] font-bold border transition-all ${t === 'error' ? 'bg-red-500/10 text-red-500 border-red-500/20' : 'bg-cyan/5 text-cyan border-cyan/20'}`;
            }

            // --- CACHING LOGIC ---
            function saveToCache() {
                localStorage.setItem('linkerMasterData', JSON.stringify(masterData));
                localStorage.setItem('linkerFileHeaders', JSON.stringify(fileHeaders));
                localStorage.setItem('linkerDriveFolder', document.getElementById('driveFolderInput').value);
            }

            function loadFromCache() {
                const cachedData = localStorage.getItem('linkerMasterData');
                const cachedHeaders = localStorage.getItem('linkerFileHeaders');
                const cachedFolder = localStorage.getItem('linkerDriveFolder');
                
                if (cachedFolder) document.getElementById('driveFolderInput').value = cachedFolder;
                
                if (cachedData && cachedHeaders) {
                    masterData = JSON.parse(cachedData);
                    fileHeaders = JSON.parse(cachedHeaders);
                    if (masterData.length > 0) {
                        renderTable();
                        showStatus("Loaded previous session from cache.", "info");
                    }
                }
            }

            // --- THEME TOGGLE LOGIC ---
            document.getElementById('themeToggle').onclick = () => {
                document.documentElement.classList.toggle('dark');
                document.getElementById('sunIcon').classList.toggle('hidden');
                document.getElementById('moonIcon').classList.toggle('hidden');
            };

            // --- CLEAR ALL LOGIC ---
            document.getElementById('clearAllBtn').onclick = () => {
                if (!confirm("Are you sure you want to clear all data? This cannot be undone.")) return;
                masterData = [];
                fileHeaders = [];
                driveImages = [];
                googleAccessToken = null;
                localStorage.removeItem('linkerMasterData');
                localStorage.removeItem('linkerFileHeaders');
                localStorage.removeItem('linkerGoogleToken');
                document.getElementById('fileInput').value = "";
                renderTable();
                showStatus("All data cleared.", "info");
            };

            // --- FILE UPLOAD LOGIC ---
            document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
            document.getElementById('fileInput').onchange = async (e) => {
                if (!e.target.files.length) return;
                const f = e.target.files[0];
                showStatus("Parsing file...", "info");

                try {
                    const data = await f.arrayBuffer();
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName], { header: 1 });
                    
                    if (sheetData.length < 2) throw new Error("Empty or invalid Yoco file");
                    
                    fileHeaders = sheetData[0];
                    masterData = sheetData.slice(1).filter(row => row.length > 0 && row[NAME_COL_INDEX]); // Skip empty rows

                    showStatus(`Loaded ${masterData.length} items from ${f.name}`, "success");
                    saveToCache();
                    autoMatchImages(); // Trigger match if images already fetched
                    renderTable();
                } catch (err) {
                    console.error("Spreadsheet Error:", err);
                    showStatus("Error reading file. Ensure it's a valid Yoco Export.", "error");
                }
            };

            // --- DRIVE FETCH & MATCH LOGIC ---
            function fuzzyMatch(name1, name2) {
                if (!name1 || !name2) return false;
                const s1 = name1.toString().toLowerCase().replace(/[^a-z0-9]/g, '');
                const s2 = name2.toString().toLowerCase().replace(/[^a-z0-9]/g, '');
                if (!s1 || !s2) return false;
                return s1.includes(s2) || s2.includes(s1);
            }

            // --- AUTH HELPER: get a valid Google access token (cached or via popup) ---
            async function getGoogleAccessToken() {
                if (googleAccessToken) return googleAccessToken;
                const provider = new GoogleAuthProvider();
                provider.addScope('https://www.googleapis.com/auth/drive.readonly');
                const result = await signInWithPopup(auth, provider);
                const credential = GoogleAuthProvider.credentialFromResult(result);
                googleAccessToken = credential.accessToken;
                localStorage.setItem('linkerGoogleToken', googleAccessToken);
                return googleAccessToken;
            }

            document.getElementById('fetchDriveImagesBtn').onclick = async () => {
                const urlInput = document.getElementById('driveFolderInput').value.trim();
                
                let folderId = null;
                const match = urlInput.match(/\/folders\/([a-zA-Z0-9_-]+)/);
                if (match) folderId = match[1];
                else if (urlInput.length > 15 && !urlInput.includes('/')) folderId = urlInput;
                
                if (!folderId) { showStatus("Invalid Google Drive Folder URL", "error"); return; }

                try {
                    const token = await getGoogleAccessToken();
                    await fetchImagesWithToken(token, folderId);
                } catch (e) {
                    console.error("Firebase Auth failed:", e);
                    showStatus(`Google Login failed: ${e.message}`, "error");
                }
            };

            async function fetchImagesWithToken(token, folderId) {
                const btn = document.getElementById('fetchDriveImagesBtn');
                btn.disabled = true; btn.textContent = "FETCHING...";
                try {
                    const driveApiUrl = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType+contains+'image/'&fields=files(id,name,mimeType,thumbnailLink,webContentLink)`;
                    const res = await fetch(driveApiUrl, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (!res.ok) {
                        const errorData = await res.json();
                        if (res.status === 401) {
                            // Token expired — clear it and silently re-authenticate
                            googleAccessToken = null;
                            localStorage.removeItem('linkerGoogleToken');
                            showStatus("Session expired. Signing in again...", "info");
                            btn.textContent = "FETCH DRIVE IMAGES"; btn.disabled = false;
                            const newToken = await getGoogleAccessToken();
                            return fetchImagesWithToken(newToken, folderId);
                        }
                        throw new Error(errorData.error?.message || "Drive API fetch failed");
                    }
                    const data = await res.json();
                    
                    driveImages = data.files.map(f => {
                        // Use thumbnailLink (removing the default =s220 size constraint) as it bypasses Google's embedding blocks
                        const directImgUrl = f.thumbnailLink 
                            ? f.thumbnailLink.replace(/=s\d+$/, '=s1000') 
                            : `https://drive.google.com/thumbnail?id=${f.id}&sz=w1000`;
                            
                        return { id: f.id, name: f.name, url: directImgUrl };
                    });

                    autoMatchImages();
                } catch (err) {
                    console.error("Drive Fetch Error:", err);
                    showStatus(err.message, "error");
                } finally {
                    btn.textContent = "FETCH DRIVE IMAGES";
                    btn.disabled = false;
                }
            }

            function autoMatchImages() {
                if (driveImages.length === 0 || masterData.length === 0) return;
                let matchCount = 0;
                masterData.forEach(row => {
                    if (!row[IMAGE_COL_INDEX]) {
                        const matchedImg = driveImages.find(img => fuzzyMatch(img.name.split('.')[0], row[NAME_COL_INDEX]));
                        if (matchedImg) {
                            row[IMAGE_COL_INDEX] = matchedImg.url;
                            matchCount++;
                        }
                    }
                });
                if (matchCount > 0) saveToCache();
                showStatus(`Fetched ${driveImages.length} images. Auto-matched ${matchCount} items.`, "success");
                renderTable();
            }

            // --- TABLE UI ---
            function renderTable() {
                const search = document.getElementById('masterFilter').value.toLowerCase();
                const tbody = document.getElementById('tableBody'); tbody.innerHTML = "";
                
                document.getElementById('resultsTable').classList.toggle('hidden', masterData.length === 0);
                document.getElementById('emptyState').classList.toggle('hidden', masterData.length > 0);
                document.getElementById('controlsBar').classList.toggle('hidden', masterData.length === 0);
                document.getElementById('clearAllBtn').classList.toggle('hidden', masterData.length === 0);

                masterData.forEach((row, index) => {
                    const name = (row[NAME_COL_INDEX] || '').toString();
                    if (!name.toLowerCase().includes(search)) return;

                    const cat = row[CAT_COL_INDEX] || '-';
                    const price = row[PRICE_COL_INDEX] || '0.00';
                    const imgUrl = row[IMAGE_COL_INDEX];

                    const r = document.createElement('tr');
                    const imageHtml = imgUrl 
                        ? `<img src="${imgUrl}" class="w-10 h-10 object-cover rounded-lg border border-slate-200 cursor-pointer hover:border-cyan" onclick="openImagePicker(${index})" title="Click to change image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjY2JjYmNiIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIxOCIgaGVpZ2h0PSIxOCIgeD0iMyIgeT0iMyIgcng9IjIiIHJ5PSIyIi8+PGNpcmNsZSBjeD0iOC41IiBjeT0iOC41IiByPSIxLjUiLz48cGF0aCBkPSJNMjEgMTVMMTYgMTBMNSAyMSIvPjwvc3ZnPg=='">`
                        : `<button onclick="openImagePicker(${index})" class="px-3 py-1 bg-slate-100 dark:bg-slate-800 text-slate-500 rounded-lg text-[10px] font-bold hover:bg-cyan/10 hover:text-cyan transition-colors uppercase">Link Image</button>`;
                        
                    r.innerHTML = `
                        <td class="px-8 py-3">${imageHtml}</td>
                        <td class="px-8 py-3 font-bold">${name}</td>
                        <td class="px-8 py-3 text-slate-500 font-medium">${cat}</td>
                        <td class="px-8 py-3 text-cyan font-black">R${price}</td>`;
                    tbody.appendChild(r);
                });
            }

            document.getElementById('masterFilter').oninput = renderTable;

            // --- IMAGE PICKER ---
            window.openImagePicker = (index) => {
                if (driveImages.length === 0) { showStatus("Please fetch images from Google Drive first.", "error"); return; }
                currentlyPickingImageForIndex = index;
                document.getElementById('imagePickerProductName').textContent = masterData[index][NAME_COL_INDEX];
                document.getElementById('imagePickerSearch').value = "";
                renderImagePickerGrid(driveImages);
                document.getElementById('imagePickerModal').classList.remove('hidden');
            };

            function renderImagePickerGrid(images) {
                const grid = document.getElementById('imagePickerGrid'); grid.innerHTML = "";
                images.forEach(img => {
                    const d = document.createElement('div');
                    d.className = "flex flex-col gap-2 p-2 rounded-xl border border-transparent hover:border-cyan hover:bg-cyan/5 cursor-pointer transition-all";
                    d.innerHTML = `
                        <img src="${img.url}" class="w-full aspect-square object-cover rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800">
                        <span class="text-[10px] font-medium text-center truncate">${img.name}</span>`;
                    d.onclick = () => {
                        masterData[currentlyPickingImageForIndex][IMAGE_COL_INDEX] = img.url;
                        document.getElementById('imagePickerModal').classList.add('hidden');
                        saveToCache();
                        renderTable();
                    };
                    grid.appendChild(d);
                });
            }

            document.getElementById('closeImagePickerModal').onclick = () => document.getElementById('imagePickerModal').classList.add('hidden');
            document.getElementById('imagePickerSearch').oninput = (e) => {
                renderImagePickerGrid(driveImages.filter(img => img.name.toLowerCase().includes(e.target.value.toLowerCase())));
            };

            // --- EXPORT ---
            document.getElementById('excelBtn').onclick = () => {
                const wb = XLSX.utils.book_new(); 
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([fileHeaders, ...masterData]), "Products");
                XLSX.writeFile(wb, `Updated_Yoco_Export.xlsx`);
            };
            
            // Execute initial load
            loadFromCache();
            
            // Save folder URL immediately if user types it
            document.getElementById('driveFolderInput').oninput = () => {
                localStorage.setItem('linkerDriveFolder', document.getElementById('driveFolderInput').value);
            };
        };
        init();
    </script>
</body>
</html>
