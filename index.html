                { "module": "Site Management", "questionNumber": 26, "question": "What does setting a 'Credit Limit' do?", "answerOptions": [ { "text": "Prevents charging more once limit is reached.", "isCorrect": true, "rationale": "Financial control." }, { "text": "Auto charges card.", "isCorrect": false }, { "text": "Sends text.", "isCorrect": false }, { "text": "Deletes account.", "isCorrect": false } ] },
                { "module": "Site Management", "questionNumber": 27, "question": "Why must you 'Register Devices'?", "answerOptions": [ { "text": "To authorize hardware to access store data.", "isCorrect": true, "rationale": "Security and licensing." }, { "text": "Track battery.", "isCorrect": false }, { "text": "Install games.", "isCorrect": false }, { "text": "Connect WiFi.", "isCorrect": false } ] },
                { "module": "Site Management", "questionNumber": 28, "question": "What is 'Sit Down Area Setup'?", "answerOptions": [ { "text": "To design floor plan with tables.", "isCorrect": true, "rationale": "Table management." }, { "text": "Reserve seats.", "isCorrect": false }, { "text": "Calculate footage.", "isCorrect": false }, { "text": "Cleaning schedule.", "isCorrect": false } ] },
                { "module": "Site Management", "questionNumber": 29, "question": "Difference between 'Percentage' and 'Fixed Amount' discount?", "answerOptions": [ { "text": "Percentage is a ratio, Fixed Amount is specific value.", "isCorrect": true, "rationale": "Percentage scales, fixed does not." }, { "text": "Staff vs Customer.", "isCorrect": false }, { "text": "Password required.", "isCorrect": false }, { "text": "No difference.", "isCorrect": false } ] },
                { "module": "Site Management", "questionNumber": 30, "question": "What does 'Account Deposit' refer to?", "answerOptions": [ { "text": "Adding money to account balance (Pre-payment).", "isCorrect": true, "rationale": "Loading credit." }, { "text": "Banking cash.", "isCorrect": false }, { "text": "Refund.", "isCorrect": false }, { "text": "Security deposit.", "isCorrect": false } ] },
                { "module": "Inventory Management", "questionNumber": 31, "question": "Benefit of Counting Stock per Category?", "answerOptions": [ { "text": "Allows different teams to count simultaneously.", "isCorrect": true, "rationale": "Specialization and speed." }, { "text": "Takes longer.", "isCorrect": false }, { "text": "Resets sales.", "isCorrect": false }, { "text": "Required by law.", "isCorrect": false } ] },
                { "module": "Site Management", "questionNumber": 32, "question": "What happens if you delete a used 'Payment Method'?", "answerOptions": [ { "text": "Causes reporting errors; deactivation is safer.", "isCorrect": true, "rationale": "Breaks historical data." }, { "text": "Refunds transactions.", "isCorrect": false }, { "text": "Nothing.", "isCorrect": false }, { "text": "Deletes items.", "isCorrect": false } ] },
                { "module": "Inventory Management", "questionNumber": 33, "question": "Purpose of 'Managing Stock Locations Per Product'?", "answerOptions": [ { "text": "To specify deduction location per product.", "isCorrect": true, "rationale": "Maps beer sales to bar fridge." }, { "text": "Reorganize shelves.", "isCorrect": false }, { "text": "Increase price.", "isCorrect": false }, { "text": "Prevent theft.", "isCorrect": false } ] },
                { "module": "Inventory Management", "questionNumber": 34, "question": "What implies a 'Manufactured Item'?", "answerOptions": [ { "text": "Item created in-house from others.", "isCorrect": true, "rationale": "Batch cocktails, sauces." }, { "text": "Bought from factory.", "isCorrect": false }, { "text": "Furniture.", "isCorrect": false }, { "text": "Coupon.", "isCorrect": false } ] },
                { "module": "Product Management", "questionNumber": 35, "question": "What does 'Minimum/Maximum Selection' do?", "answerOptions": [ { "text": "Enforces rules like 'Must choose 1'.", "isCorrect": true, "rationale": "Forces choices." }, { "text": "Limits creation.", "isCorrect": false }, { "text": "Sets price range.", "isCorrect": false }, { "text": "Limits stock.", "isCorrect": false } ] }
            ]
        };

        const els = {
            startScreen: document.getElementById('start-screen'),
            questionScreen: document.getElementById('question-screen'),
            resultsScreen: document.getElementById('results-screen'),
            adminModal: document.getElementById('admin-modal'),
            adminDashboard: document.getElementById('admin-dashboard'),
            adminModalTitle: document.getElementById('admin-modal-title'),
            adminVerifyBtn: document.getElementById('admin-verify-btn'),
            
            inputFname: document.getElementById('input-fname'),
            inputSname: document.getElementById('input-sname'),
            userDisplay: document.getElementById('user-display'),
            userDisplayText: document.getElementById('user-display-text'),
            adminIndicator: document.getElementById('admin-indicator'),
            adminLogoutBtn: document.getElementById('admin-logout-btn'),
            
            qText: document.getElementById('question-text'),
            hintText: document.getElementById('hint-text'),
            options: document.getElementById('options-container'),
            progressBar: document.getElementById('progress-bar'),
            progressText: document.getElementById('progress-text'),
            saveIndicator: document.getElementById('save-indicator'),
            
            feedbackArea: document.getElementById('feedback-area'),
            simpleFooter: document.getElementById('simple-footer'),
            feedbackTitle: document.getElementById('feedback-title'),
            feedbackRationale: document.getElementById('feedback-rationale'),
            feedbackIcon: document.getElementById('feedback-icon'),
            
            scoreBadge: document.getElementById('score-badge'),
            qNumber: document.getElementById('q-number'),
            qLabelText: document.getElementById('q-label-text'),
            finalScore: document.getElementById('final-score'),
            finalProgress: document.getElementById('final-progress'),
            resultIcon: document.getElementById('result-icon'),
            candidateNameDisplay: document.getElementById('candidate-name-display'),
            moduleBreakdown: document.getElementById('module-breakdown'),
            exitReviewBtn: document.getElementById('exit-review-btn'),
            
            adminPwInput: document.getElementById('admin-pw-input'),
            adminMsg: document.getElementById('admin-msg'),
            dashboardContent: document.getElementById('dashboard-content')
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error:", err);
            }
        };

        onAuthStateChanged(auth, (firebaseUser) => {
            user = firebaseUser;
            if (user) syncFromCloud();
        });

        const syncToCloud = async (isFinished = false) => {
            if (!user || !userName) return;
            
            // SANITIZE userAnswers to remove undefined
            const sanitizedUserAnswers = userAnswers.map(ua => ({
                selectedText: ua.selectedText || "",
                isCorrect: !!ua.isCorrect,
                rationale: ua.rationale || ""
            }));

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'exam_results', user.uid);
            const data = {
                userName,
                score,
                currentQuestionIndex,
                answersLog,
                userAnswers: sanitizedUserAnswers, // SYNCED
                shuffledQuestions,
                isFinished,
                lastUpdated: serverTimestamp()
            };
            try {
                await setDoc(docRef, data, { merge: true });
                els.saveIndicator.style.opacity = '1';
                setTimeout(() => els.saveIndicator.style.opacity = '0', 2000);
            } catch (e) { console.error("Cloud save failed", e); }
        };

        const syncFromCloud = async () => {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'exam_results', user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const cloudData = docSnap.data();
                userName = cloudData.userName;
                score = cloudData.score;
                currentQuestionIndex = cloudData.currentQuestionIndex;
                answersLog = cloudData.answersLog || [];
                userAnswers = cloudData.userAnswers || []; // RETRIEVED
                shuffledQuestions = cloudData.shuffledQuestions;
                
                els.userDisplayText.textContent = userName;
                els.userDisplayText.classList.remove('hidden');
                els.userDisplay.classList.remove('hidden');
                
                els.startScreen.classList.add('hidden');
                if (cloudData.isFinished) {
                    renderResultsUI();
                } else {
                    els.questionScreen.classList.remove('hidden');
                    renderQuestion();
                }
            }
        };

        const setupDashboardListener = () => {
            if (!isAdmin || !user) return;
            const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'exam_results');
            onSnapshot(qRef, (snapshot) => {
                const results = [];
                snapshot.forEach(doc => results.push({ id: doc.id, ...doc.data() }));
                renderDashboard(results);
            });
        };

        const shuffleArray = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        window.startQuiz = () => {
            const fname = els.inputFname.value.trim();
            const sname = els.inputSname.value.trim();
            if (!fname || !sname) { alert("Enter both names to begin."); return; }
            userName = `${fname} ${sname}`;
            els.userDisplayText.textContent = userName;
            els.userDisplayText.classList.remove('hidden');
            els.userDisplay.classList.remove('hidden');
            els.startScreen.classList.add('hidden');
            els.questionScreen.classList.remove('hidden');
            score = 0;
            currentQuestionIndex = 0;
            answersLog = [];
            userAnswers = [];
            shuffledQuestions = shuffleArray(examDataRaw.questions);
            syncToCloud();
            renderQuestion();
        };

        window.renderQuestion = () => {
            const q = shuffledQuestions[currentQuestionIndex];
            if (!q) return;
            isConfirmed = false;
            currentSelection = null;
            els.qNumber.textContent = currentQuestionIndex + 1;
            els.progressText.textContent = `Question ${currentQuestionIndex + 1} of ${shuffledQuestions.length}`;
            els.progressBar.style.width = `${(currentQuestionIndex / shuffledQuestions.length) * 100}%`;
            els.qText.textContent = q.question;
            if (q.hint) { els.hintText.textContent = q.hint; els.hintText.classList.remove('hidden'); }
            else { els.hintText.classList.add('hidden'); }
            
            els.options.innerHTML = '';
            
            const opts = shuffleArray(q.answerOptions); 
            
            // IF REVIEW MODE
            if (isReviewMode) {
                const userAnswer = userAnswers[currentQuestionIndex] || {};
                
                // Show exit button
                els.exitReviewBtn.classList.remove('hidden');

                opts.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.disabled = true; // Disable clicking
                    btn.className = `w-full text-left p-5 rounded-2xl border border-white/10 bg-white/5 flex items-center group relative overflow-hidden opacity-100`;
                    
                    // Logic for coloring
                    const isSelected = opt.text === userAnswer.selectedText;
                    
                    if (opt.isCorrect) {
                        btn.classList.remove('border-white/10', 'bg-white/5');
                        btn.classList.add('border-green-500', 'bg-green-500/10');
                    } else if (isSelected && !opt.isCorrect) {
                        btn.classList.remove('border-white/10', 'bg-white/5');
                        btn.classList.add('border-red-500', 'bg-red-500/10');
                    } else {
                        btn.classList.add('opacity-40');
                    }

                    btn.innerHTML = `<div class="flex items-start"><span class="font-black text-[#00A3E1] mr-4 mt-0.5 text-lg">${labels[idx]}</span><span class="text-white font-medium flex-grow text-lg">${opt.text}</span></div>`;
                    els.options.appendChild(btn);
                });

                // Show Feedback Immediately
                els.feedbackArea.classList.remove('hidden');
                const isCorr = userAnswer.isCorrect;
                els.feedbackTitle.textContent = isCorr ? "Correct" : "Incorrect";
                els.feedbackTitle.className = isCorr ? "font-black text-xl mb-1 text-green-500 uppercase tracking-tight" : "font-black text-xl mb-1 text-red-500 uppercase tracking-tight";
                
                // Find correct option for rationale
                const correctOpt = opts.find(o => o.isCorrect);
                els.feedbackRationale.textContent = correctOpt ? correctOpt.rationale : "";
                
                els.feedbackIcon.innerHTML = isCorr 
                    ? `<div class="bg-green-500/10 p-3 rounded-full border border-green-500/20"><svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>` 
                    : `<div class="bg-red-500/10 p-3 rounded-full border border-red-500/20"><svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></div>`;
                
                document.getElementById('next-btn').querySelector('span').textContent = (currentQuestionIndex === shuffledQuestions.length - 1) ? "Finish Review" : "Next Question";
                els.simpleFooter.classList.add('hidden');
                
            } else {
                // NORMAL EXAM MODE
                els.exitReviewBtn.classList.add('hidden');
                
                opts.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `w-full text-left p-5 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 transition-all duration-200 flex items-center group relative overflow-hidden`;
                    btn.innerHTML = `<div class="flex items-start"><span class="font-black text-[#00A3E1] mr-4 mt-0.5 text-lg">${labels[idx]}</span><span class="text-white font-medium flex-grow text-lg">${opt.text}</span></div>`;
                    btn.onclick = () => selectOption(opt, btn, opts);
                    els.options.appendChild(btn);
                });
                els.feedbackArea.classList.add('hidden');
                els.simpleFooter.classList.add('hidden');
            }
        };

        const selectOption = (opt, btn, allOptions) => {
            if (isConfirmed) return;
            Array.from(els.options.children).forEach(b => {
                b.classList.remove('border-[#00A3E1]', 'bg-[#00A3E1]/10');
                b.classList.add('border-white/10', 'bg-white/5');
            });
            btn.classList.add('border-[#00A3E1]', 'bg-[#00A3E1]/10');
            btn.classList.remove('border-white/10', 'bg-white/5');
            currentSelection = { opt, btn, allOptions };
            if (isAdmin) {
                els.feedbackArea.classList.remove('hidden');
                els.feedbackTitle.textContent = "Staff Mode: Verify Choice";
                els.feedbackRationale.textContent = "Confirm to see correctness logic.";
                els.feedbackIcon.innerHTML = '';
                document.getElementById('next-btn').querySelector('span').textContent = "Verify Choice";
            } else {
                els.simpleFooter.classList.remove('hidden');
            }
        };

        window.handleConfirmNext = () => {
            if (isReviewMode) { 
                if (currentQuestionIndex < shuffledQuestions.length - 1) {
                    currentQuestionIndex++;
                    renderQuestion();
                } else {
                    // End of review
                    isReviewMode = false;
                    renderResultsUI();
                }
                return; 
            }

            if (!currentSelection) return;
            if (!isConfirmed) {
                isConfirmed = true;
                const { opt, btn, allOptions } = currentSelection;
                const q = shuffledQuestions[currentQuestionIndex];
                
                // SAVE USER ANSWER
                userAnswers[currentQuestionIndex] = {
                    selectedText: opt.text || "",
                    isCorrect: !!opt.isCorrect,
                    rationale: opt.rationale || ""
                };

                if (opt.isCorrect) score++;
                answersLog.push({ module: q.module, correct: opt.isCorrect });
                
                if (isAdmin) {
                    Array.from(els.options.children).forEach((b, i) => {
                        if (allOptions[i].isCorrect) b.classList.add('border-green-500', 'bg-green-500/10');
                        else if (b === btn) b.classList.add('border-red-500', 'bg-red-500/10');
                    });
                    els.feedbackTitle.textContent = opt.isCorrect ? "Correct" : "Incorrect";
                    els.feedbackTitle.className = opt.isCorrect ? "font-black text-xl mb-1 text-green-500 uppercase tracking-tight" : "font-black text-xl mb-1 text-red-500 uppercase tracking-tight";
                    els.feedbackRationale.textContent = opt.rationale || "";
                    els.feedbackIcon.innerHTML = opt.isCorrect ? `<div class="bg-green-500/10 p-3 rounded-full border border-green-500/20"><svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>` : `<div class="bg-red-500/10 p-3 rounded-full border border-red-500/20"><svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></div>`;
                    document.getElementById('next-btn').querySelector('span').textContent = "Continue";
                } else { nextQuestion(); }
            } else { nextQuestion(); }
        };

        const nextQuestion = () => {
            currentQuestionIndex++;
            syncToCloud();
            if (currentQuestionIndex < shuffledQuestions.length) renderQuestion();
            else finishExam();
        };

        const finishExam = () => {
            els.questionScreen.classList.add('hidden');
            syncToCloud(true);
            renderResultsUI();
        };

        const renderResultsUI = () => {
            els.startScreen.classList.add('hidden');
            els.questionScreen.classList.add('hidden');
            els.adminDashboard.classList.add('hidden');
            els.resultsScreen.classList.remove('hidden');
            els.candidateNameDisplay.textContent = `Candidate Profile: ${userName}`;
            els.finalScore.textContent = score;
            const pct = Math.round((score / 35) * 100);
            els.finalProgress.style.width = `${pct}%`;
            const modStats = {};
            answersLog.forEach(log => {
                if (!modStats[log.module]) modStats[log.module] = { total: 0, correct: 0 };
                modStats[log.module].total++;
                if (log.correct) modStats[log.module].correct++;
            });
            els.moduleBreakdown.innerHTML = '';
            Object.entries(modStats).forEach(([module, stats]) => {
                const mPct = Math.round((stats.correct / stats.total) * 100);
                const color = mPct >= 80 ? 'bg-green-500' : (mPct >= 50 ? 'bg-yellow-500' : 'bg-red-500');
                els.moduleBreakdown.innerHTML += `<div><div class="flex justify-between text-xs mb-3"><span class="font-bold text-white uppercase tracking-widest">${module}</span><span class="font-black text-white/60">${mPct}% (${stats.correct}/${stats.total})</span></div><div class="w-full bg-white/5 rounded-full h-1.5 overflow-hidden"><div class="${color} h-1.5 rounded-full" style="width: ${mPct}%"></div></div></div>`;
            });
        };

        const renderDashboard = (results) => {
            if (results.length === 0) {
                els.dashboardContent.innerHTML = `<div class="text-center py-20 text-white/20 font-bold uppercase tracking-widest">No candidates found.</div>`;
                return;
            }
            els.dashboardContent.innerHTML = results.map(res => {
                const pct = Math.round((res.score / 35) * 100);
                const statusColor = pct >= 80 ? 'text-green-500' : (pct >= 50 ? 'text-yellow-500' : 'text-red-500');
                const modSummary = {};
                (res.answersLog || []).forEach(l => {
                    if (!modSummary[l.module]) modSummary[l.module] = { c:0, t:0 };
                    modSummary[l.module].t++; if (l.correct) modSummary[l.module].c++;
                });
                const summaryHtml = Object.entries(modSummary).map(([m, s]) => `<span class="px-2 py-0.5 rounded-full bg-white/5 border border-white/5 text-[9px] uppercase font-bold">${m.split(' ')[0]}: ${Math.round((s.c/s.t)*100)}%</span>`).join('');
                return `<div class="bg-white/5 border border-white/10 p-5 rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-4"><div class="flex-grow"><div class="text-xs font-black uppercase tracking-widest text-[#00A3E1] mb-1">Candidate</div><h4 class="text-xl font-bold text-white">${res.userName || 'Anonymous'}</h4><div class="flex flex-wrap gap-2 mt-3">${summaryHtml}</div></div><div class="text-right flex items-center gap-6"><div><div class="text-[10px] font-black uppercase tracking-widest text-white/40 mb-1 text-right">Performance</div><div class="text-3xl font-black ${statusColor}">${res.score}<span class="text-lg opacity-30">/35</span></div></div><button onclick="viewUserResults('${res.id}')" class="p-3 bg-white/10 rounded-xl hover:bg-white/20 transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg></button></div></div>`;
            }).join('');
        };

        window.viewUserResults = async (uid) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'exam_results', uid);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                const data = snap.data();
                userName = data.userName; score = data.score; answersLog = data.answersLog; userAnswers = data.userAnswers || []; shuffledQuestions = data.shuffledQuestions;
                renderResultsUI();
            }
        };

        window.toggleAdminPanel = () => {
            pendingNewAttempt = false;
            els.adminModalTitle.textContent = "Administrator Portal";
            els.adminVerifyBtn.textContent = "Unlock";
            els.adminModal.classList.toggle('hidden');
            els.adminPwInput.value = ''; els.adminMsg.textContent = '';
        };

        window.requestNewAttempt = () => {
            pendingNewAttempt = true;
            els.adminModalTitle.textContent = "Staff Approval Required";
            els.adminVerifyBtn.textContent = "Authorize New Attempt";
            els.adminModal.classList.remove('hidden');
            els.adminPwInput.value = ''; els.adminMsg.textContent = '';
        };

        window.verifyAdmin = async () => {
            const pw = els.adminPwInput.value;
            if (ALLOWED_ADMIN_PASSWORDS.includes(pw)) {
                if (pendingNewAttempt) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'exam_results', user.uid);
                    await deleteDoc(docRef);
                    localStorage.removeItem(SESSION_KEY);
                    location.reload();
                } else {
                    isAdmin = true;
                    els.adminIndicator.classList.remove('hidden');
                    els.adminLogoutBtn.classList.remove('hidden');
                    els.scoreBadge.classList.remove('hidden');
                    els.adminModal.classList.add('hidden');
                    setupDashboardListener();
                    toggleAdminDashboard();
                }
            } else {
                els.adminMsg.textContent = "Invalid Passcode";
                els.adminPwInput.classList.add('shake');
                setTimeout(() => els.adminPwInput.classList.remove('shake'), 500);
            }
        };

        window.toggleAdminDashboard = () => {
            els.adminDashboard.classList.toggle('hidden');
            els.startScreen.classList.add('hidden');
            els.questionScreen.classList.add('hidden');
            els.resultsScreen.classList.add('hidden');
            if (els.adminDashboard.classList.contains('hidden')) {
                if (userName) renderResultsUI(); else els.startScreen.classList.remove('hidden');
            }
        };

        window.logoutAdmin = () => {
            isAdmin = false;
            els.adminIndicator.classList.add('hidden');
            els.adminLogoutBtn.classList.add('hidden');
            els.adminDashboard.classList.add('hidden');
            if (userName) renderResultsUI(); else els.startScreen.classList.remove('hidden');
        };

        window.startReview = () => {
            isReviewMode = true; 
            currentQuestionIndex = 0;
            els.resultsScreen.classList.add('hidden');
            els.questionScreen.classList.remove('hidden');
            renderQuestion();
        };

        window.exitReview = () => {
            isReviewMode = false;
            renderResultsUI();
        };

        window.goHome = () => {
            // Reset UI
            els.resultsScreen.classList.add('hidden');
            els.startScreen.classList.remove('hidden');
            els.userDisplayText.classList.add('hidden');
            els.userDisplay.classList.add('hidden');
            
            // Clear inputs
            els.inputFname.value = "";
            els.inputSname.value = "";
            
            // Reset State
            userName = "";
            score = 0;
            currentQuestionIndex = 0;
            answersLog = [];
            userAnswers = [];
            isConfirmed = false;
        };

        initAuth();
    </script>
</body>
</html>
